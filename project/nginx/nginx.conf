events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend1 { server backend1:8001; }
    upstream backend2 { server backend2:8002; }
    upstream backend3 { server backend3:8003; }
    upstream backend4 { server backend4:8004; }
    upstream backend5 { server backend5:8005; }

    server {
        listen 80;

        # ── Portal (landing page) ──────────────────────────────
        location = / {
            root /usr/share/nginx/html/portal;
            try_files /index.html =404;
        }

        # ── Frontend static files ──────────────────────────────
        location /indexing {
            alias /usr/share/nginx/html/member1;
            try_files $uri $uri/ /indexing/index.html;
        }
        location /query {
            alias /usr/share/nginx/html/member2;
            try_files $uri $uri/ /query/index.html;
        }
        location /transaction {
            alias /usr/share/nginx/html/member3;
            try_files $uri $uri/ /transaction/index.html;
        }
        location /concurrency {
            alias /usr/share/nginx/html/member4;
            try_files $uri $uri/ /concurrency/index.html;
        }
        location /backup {
            alias /usr/share/nginx/html/member5;
            try_files $uri $uri/ /backup/index.html;
        }

        # ── API proxy → FastAPI backends ───────────────────────
        location /api/indexing {
            proxy_pass http://backend1;
            proxy_set_header Host $host;
        }
        location /api/query {
            proxy_pass http://backend2;
            proxy_set_header Host $host;
        }
        location /api/transaction {
            proxy_pass http://backend3;
            proxy_set_header Host $host;
        }
        location /api/concurrency {
            proxy_pass http://backend4;
            proxy_set_header Host $host;
        }
        location /api/backup {
            proxy_pass http://backend5;
            proxy_set_header Host $host;
        }
    }
}
